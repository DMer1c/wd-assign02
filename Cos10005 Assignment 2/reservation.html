<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gordito | Reservations</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">Gordito</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="restaurants.html">Restaurants</a>
        <a href="recommend.html">Recommendations</a>
        <a href="reservation.html" class="active">Reservations</a>
        <a href="register.html">Register</a>
      </nav>
    </header>
    <main>
      <h1>Make A Reservation</h1>
      <div id="reservation-error-box" style="display:none; color:red;"></div>
      <form id="reservation-form" method="POST" action="http://mercury.swin.edu.au/it000000/cos10005/regtest.php">
        <div>
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name">
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email">
        </div>
        <div>
          <label for="phonenumber">Phone Number</label>
          <input type="text" id="phonenumber" name="phonenumber">
        </div>
        <div>
          <label for="restaurant">Restaurant</label>
          <select id="restaurant" name="restaurant">
            <option value="">-- Select a Restaurant --</option>
            <option value="landro">Landro</option>
            <option value="3kingdoms">3 Kingdoms</option>
            <option value="hosiak">Ho Siak</option>
            <option value="kuishinbō">Kuishinbō</option>
            <option value="quesoycarne">Queso y Carne</option>
            <option value="tondoo">Tond-oo</option>
          </select>
        </div>
        <div>
          <label for="date">Reservation Date</label>
          <input type="date" id="date" name="date">
        </div>
        <div>
          <label for="time">Reservation Time</label>
          <input type="time" id="time" name="time">
        </div>
        <div>
          <label for="people">Number of People</label>
          <input type="number" min="1" id="people" name="people">
        </div>
        <div>
          <label for="specialrequests">Special Requests</label>
          <textarea id="specialrequests" name="specialrequests"></textarea>
        </div>
        <div>
          <label for="deposit">Deposit</label>
          <input type="text" id="deposit" name="deposit" readonly>
        </div>
        <div>
          <label for="deposit-method">Deposit Method</label>
          <select id="deposit-method" name="deposit-method">
            <option value="">-- Select Payment Method --</option>
            <option value="voucher">Voucher</option>
            <option value="online">Online Payment</option>
          </select>
        </div>
        <div id="voucher-section">
          <label for="voucher-code">Voucher Code</label>
          <input type="text" id="voucher-code" name="voucher-code">
        </div>
        <div id="card-section">
          <label for="card-number">Credit Card Number</label>
          <input type="text" id="card-number" name="card-number">
        </div>
        <div>
          <label for="billing-email">Billing Email</label>
          <label><input type="checkbox" id="same-email">Same as Email Address</label>
          <input type="email" id="billing-email" name="billing-email">
        </div>
        <div>
          <button type="submit">Submit</button>
        </div>
      </form>
    </main>
    <footer><p>&copy; 2026 Gordito. All rights reserved.</p></footer>
    <script src="js/script.js"></script>
  </body>
</html>
